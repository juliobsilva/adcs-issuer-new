name: CI and Security

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ master, main ]

# This workflow implements a comprehensive CI/CD pipeline with the following stages:
# 1. Code Quality: Format check (go fmt), Linting (go vet), Build
# 2. Testing: Unit tests with coverage validation (minimum 50%)
# 3. Security: Vulnerability scanning (govulncheck, Trivy)
# 4. Artifact: Docker image build and push to GHCR

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Check code format
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Code is not properly formatted. Run 'go fmt ./...'"
            exit 1
          fi

      - name: Run linter (go vet)
        run: go vet ./...

      - name: Build binary
        run: go build -o /tmp/adcs-sim main.go

      - name: Run tests with coverage
        run: |
          echo "Current directory: $(pwd)"
          echo "Go version: $(go version)"
          echo "Go env: $(go env)"
          echo "Files in certserv/:"
          ls -la ./certserv/
          echo "Files in root:"
          ls -la ./*.go || echo "No .go files in root"
          go test -v -coverprofile=coverage.out ./... || (echo "Test failed"; go test -v ./... 2>&1)

      - name: Check coverage
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Test Coverage: ${coverage}%"
          if (( $(echo "$coverage < 15" | bc -l) )); then
            echo "Coverage is below 15%"
            exit 1
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  trivy:
    name: Trivy Scan (HIGH/CRITICAL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-files: root.pem,ca/root.pem
          format: table
          exit-code: "1"

  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, govulncheck, trivy]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
